<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Blood - BloodLink</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container navbar">
      <a href="index.html" style="font-weight:700; color:#b71c1c;">BloodLink</a>
      <nav class="nav-links">
        <a href="index.html" data-i18n="navHome">Home</a>
        <a href="request.html" class="active" data-i18n="navRequest">Request Blood</a>
        <a href="donate.html" data-i18n="navDonate">Become a Donor</a>
        <a href="learn.html" data-i18n="navLearn">Learn About Blood Donation</a>
        <a href="donors.html" data-i18n="navDonors">Donor List</a>
        <a href="coordinator.html" data-i18n="navCoord">Coordinator</a>
        <a href="contact.html" data-i18n="navContact">Contact</a>
      </nav>
      <div class="lang-switch">
        <label for="langSelect">🌐</label>
        <select id="langSelect" onchange="setLanguage(this.value)">
          <option value="en">English</option>
          <option value="hi">हिन्दी</option>
          <option value="mr">मराठी</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container section">
    <h1 data-i18n="requestTitle">Emergency Blood Request</h1>
    <p>Fill details to send an urgent blood request to nearby donors and NSS coordinators.</p>
    <form id="requestForm" class="card" style="padding:1rem;">
      <div class="form-grid">
        <label>Patient Name <input type="text" name="patientName" required></label>
        <label>Blood Group <select name="bloodGroup" required><option value="">Select</option><option>O+</option><option>A+</option><option>B+</option><option>AB+</option><option>O-</option><option>A-</option><option>B-</option><option>AB-</option></select></label>
        <label>City <input type="text" name="city" required></label>
        <label>Hospital <input type="text" name="hospital" required></label>
        <label>Phone <input type="tel" name="phone" required></label>
        <label>Emergency Level <select name="emergencyLevel" required><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label>
      </div>
      <div class="alert" id="eligencyDetails"><span id="urgencyLevel" class="badge badge-ok">Normal</span> <span id="textUrgency">Standard request.</span></div>
      <button class="btn" type="submit">Submit Request</button>
    </form>
  </main>

  <footer class="footer"><p>© 2026 All Rights Reserved – Shivam Sawale</p></footer>
  <script src="script.js"></script>
</body>
</html>
